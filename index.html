<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIERD — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050401;
  --gold:#e8b020;
  --gold2:#f5d060;
  --dim:#c9960c;
  --white:#f9f5ea;
  --border:rgba(232,176,32,0.12);
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Grain overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.5;
}

/* Radial glow */
body::after{
  content:'';
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  width:700px;height:500px;
  background:radial-gradient(ellipse,rgba(232,176,32,0.055) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

/* Horizontal lines */
.line-top,.line-bot{
  position:fixed;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(232,176,32,0.12),transparent);
  z-index:0;
}
.line-top{top:40px}
.line-bot{bottom:40px}

.inner{
  position:relative;z-index:1;
  text-align:center;
  padding:0 24px;
  max-width:560px;
  animation:fadeUp .9s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

/* Logo */
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(52px,10vw,88px);
  font-weight:300;
  font-style:italic;
  letter-spacing:0.04em;
  background:linear-gradient(120deg,#c9960c 0%,#e8b020 35%,#f5d060 50%,#e8b020 65%,#c9960c 100%);
  background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite, fadeUp .9s ease both;
  margin-bottom:8px;
  line-height:1;
}
@keyframes shimmer{
  from{background-position:0% center}
  to{background-position:200% center}
}

.tagline{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(15px,2.5vw,19px);
  font-weight:300;
  font-style:italic;
  color:rgba(232,176,32,0.45);
  margin-bottom:48px;
  letter-spacing:0.02em;
  animation:fadeUp .9s .1s ease both;
}

.divider{
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--dim),transparent);
  margin:0 auto 48px;
  animation:fadeUp .9s .15s ease both;
}

.message{
  font-size:clamp(13px,2vw,15px);
  font-weight:300;
  color:rgba(249,245,234,0.5);
  line-height:1.85;
  margin-bottom:44px;
  animation:fadeUp .9s .2s ease both;
}
.message strong{
  color:var(--gold);
  font-weight:400;
}

/* Email form */
.form{
  display:flex;
  gap:0;
  max-width:400px;
  margin:0 auto 16px;
  animation:fadeUp .9s .3s ease both;
  border:1px solid var(--border);
  border-radius:30px;
  overflow:hidden;
  background:rgba(232,176,32,0.03);
  transition:border-color .25s;
}
.form:focus-within{
  border-color:rgba(232,176,32,0.3);
}
.form input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  padding:13px 20px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:var(--white);
  font-weight:300;
}
.form input::placeholder{color:rgba(232,176,32,0.3)}
.form button{
  background:var(--gold);
  border:none;
  padding:13px 24px;
  font-size:13px;
  font-weight:500;
  font-family:'DM Sans',sans-serif;
  color:#000;
  cursor:pointer;
  transition:background .2s;
  white-space:nowrap;
  border-radius:0 30px 30px 0;
}
.form button:hover{background:var(--gold2)}

.form-note{
  font-size:11px;
  color:rgba(232,176,32,0.2);
  animation:fadeUp .9s .35s ease both;
  font-family:'DM Mono',monospace;
  letter-spacing:0.05em;
}

.success-msg{
  display:none;
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-style:italic;
  color:var(--gold);
  animation:fadeUp .5s ease both;
}

/* Footer */
.foot{
  position:fixed;bottom:20px;left:0;right:0;
  text-align:center;z-index:1;
  font-size:11px;
  color:rgba(232,176,32,0.18);
  font-family:'DM Mono',monospace;
  letter-spacing:0.05em;
}

/* Pulse dot */
.pulse{
  display:inline-block;
  width:5px;height:5px;
  border-radius:50%;
  background:var(--gold);
  margin-right:6px;
  vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.3;transform:scale(.6)}
}
</style>
</head>
<body>

<div class="line-top"></div>
<div class="line-bot"></div>

<div class="inner">
  <div class="logo">KLIERD</div>
  <div class="tagline">Intelligent Funding Technology</div>
  <div class="divider"></div>

  <p class="message">
    Something <strong>powerful</strong> is being built.<br>
    
    Drop your email — you'll be the first to know.
  </p>

  <div class="form" id="form">
    <input type="email" id="email-input" placeholder="your@email.com" onkeydown="if(event.key==='Enter')submit()">
    <button onclick="submit()">Notify Me</button>
  </div>

  <div class="success-msg" id="success">
    <span class="pulse"></span> You're on the list. We'll be in touch.
  </div>

  <p class="form-note">No spam. Ever.</p>
</div>

<div class="foot">© 2026 KLIERD &nbsp;·&nbsp; info@klierd.com</div>

<script>
function submit(){
  const email = document.getElementById('email-input').value.trim();
  if(!email || !email.includes('@')) return;

  // Send to Railway intake
  fetch('https://klierd-api-production.up.railway.app/api/notify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email, source: 'coming_soon' })
  }).catch(()=>{});

  document.getElementById('form').style.display = 'none';
  document.getElementById('success').style.display = 'block';
}
</script>
</body>
</html>
